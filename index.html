<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        body {
            font-family: sans-serif;
        }
    </style>
</head>

<body class="p-6">
    <header class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-4">Job Application Tracker</h1>
    
        <div class="grid grid-cols-3 gap-6 mb-6">
            <div class="p-4 shadow rounded">
                <p>Total</p>
                <span id="totalJob">0</span>
            </div>
            <div class="p-4 shadow rounded">
                <p>Interview</p>
                <span id="totalInterview">0</span>
            </div>
            <div class="p-4 shadow rounded">
                <p>Rejected</p>
                <span id="totalRejected">0</span>
            </div>
        </div>
    
        <div class="mb-4">
            <button id="all-button" class="btn btn-primary btn-soft">All</button>
            <button id="interview-button" class="btn btn-primary btn-soft">Interview</button>
            <button id="rejected-button" class="btn btn-primary btn-soft">Rejected</button>
        </div>
    </header>
    <script src="./index.js"></script>
</body>

</html>
